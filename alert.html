<!DOCTYPE html>
<html>
<head>
  <title>Already Voted</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .alert-container {
      width: 380px;
      padding: 40px 30px;
      text-align: center;
    }

    .alert-icon {
      font-size: 60px;
      margin-bottom: 20px;
      animation: bounceIn 0.6s ease;
    }

    .alert-container h1 {
      color: #ff6b6b;
      font-size: 28px;
      margin-bottom: 15px;
      text-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
    }

    .alert-message {
      background: rgba(239, 68, 68, 0.15);
      border: 2px solid rgba(239, 68, 68, 0.6);
      color: #ff9999;
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
      font-size: 15px;
      line-height: 1.6;
      animation: slideUp 0.6s ease-out 0.2s both;
    }

    .alert-info {
      background: rgba(100, 200, 255, 0.15);
      border: 1px solid rgba(100, 200, 255, 0.4);
      color: #a8d8ff;
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      font-size: 13px;
      animation: slideUp 0.6s ease-out 0.4s both;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 30px;
      animation: slideUp 0.6s ease-out 0.6s both;
    }

    .btn-primary {
      flex: 1;
      padding: 12px 20px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 25px rgba(37, 99, 235, 0.5);
      transform: translateY(-2px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      flex: 1;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.5);
    }

    @keyframes bounceIn {
      0% {
        opacity: 0;
        transform: scale(0.3) rotateZ(-45deg);
      }
      50% {
        transform: scale(1.05) rotateZ(5deg);
      }
      70% {
        transform: scale(0.9) rotateZ(-3deg);
      }
      100% {
        opacity: 1;
        transform: scale(1) rotateZ(0deg);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="container alert-container">
  <div class="alert-icon">⚠️</div>
  <h1>Already Voted</h1>
  
  <div class="alert-message">
    You have already cast your vote in this election. Each voter can vote only once.
  </div>

  <div class="alert-info">
    Your vote has been securely recorded. Thank you for participating in our democratic process!
  </div>

  <div class="action-buttons">
    
    <button class="btn-secondary" onclick="goHome()">Back to Home</button>
  </div>
</div>

<script>
function goToResults() {
  window.location.href = "results.html";
}

function goHome() {
  localStorage.removeItem("user");
  window.location.href = "index.html";
}
</script>

</body>
</html>
