<!DOCTYPE html>
<html>
<head>
  <title>Vote</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .vote-notification {
      background: rgba(16, 185, 129, 0.2);
      border: 1px solid rgba(16, 185, 129, 0.5);
      color: #34d399;
      padding: 12px 16px;
      border-radius: 8px;
      margin: 15px 0;
      animation: slideInDown 0.4s ease, pulse 0.5s ease 1s;
      display: none;
    }

    .vote-notification.error {
      background: rgba(239, 68, 68, 0.3);
      border: 2px solid rgba(239, 68, 68, 0.8);
      color: #ff6b6b;
      animation: slideInDown 0.4s ease, shake 0.5s ease 0.5s;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }

    @keyframes slideInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shake {
      0%, 100% {
        transform: translateX(0);
      }
      25% {
        transform: translateX(-8px);
      }
      75% {
        transform: translateX(8px);
      }
    }

    #candidates {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      animation: fadeIn 0.6s ease-out;
    }

    .candidate-card {
      flex: 0 1 calc(33.333% - 14px);
      min-width: 180px;
      max-width: 220px;
    }

    @media (max-width: 1000px) {
      .candidate-card {
        flex: 0 1 calc(50% - 10px);
        min-width: 160px;
      }
    }

    @media (max-width: 600px) {
      .candidate-card {
        flex: 0 1 100%;
        max-width: 100%;
      }
    }

    .vote-btn {
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h2>Choose Your Candidate</h2>
  <div id="notification" class="vote-notification"></div>
  <div id="candidates"></div>
</div>
<script>
const user = JSON.parse(localStorage.getItem("user"));

function showVoteNotification(message, type = 'success') {
  const notification = document.getElementById("notification");
  notification.textContent = message;
  notification.className = 'vote-notification' + (type === 'error' ? ' error' : '');
  notification.style.display = 'block';
  notification.style.animation = 'slideInDown 0.4s ease';
  
  setTimeout(() => {
    notification.style.animation = 'slideInUp 0.4s ease';
    setTimeout(() => {
      notification.style.display = 'none';
    }, 400);
  }, 4000);
}

fetch("http://localhost:3000/candidates")
.then(res => res.json())
.then(data => {
  console.log(data);

  candidates.innerHTML = "";

  data.forEach((c, index) => {
    candidates.innerHTML += `
      <div class="candidate-card" style="animation-delay: ${index * 0.1}s">
        <img src="${c.image}" alt="Candidate">
        <h3>${c.name}</h3>
        <p><b>${c.party}</b></p>
        <p>${c.description}</p>
        <button class="vote-btn" onclick="vote(${c.id})">Vote for ${c.name}</button>
      </div>
    `;
  });
});

function vote(candidateId) {
  const buttons = document.querySelectorAll('button.vote-btn');
  buttons.forEach(btn => {
    btn.disabled = true;
    btn.style.animation = 'pulse 1s ease-in-out';
  });

  fetch("http://localhost:3000/vote", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user_id: user.id,
      candidate_id: candidateId,
      election_id: 1
    })
  })
  .then(res => res.text())
  .then(msg => {
    const isAlreadyVoted = msg.toLowerCase().includes('already');
    const isError = isAlreadyVoted || msg.toLowerCase().includes('error');
    
    if (isAlreadyVoted) {
      setTimeout(() => {
        window.location.href = 'alert.html';
      }, 500);
      return;
    }
    
    showVoteNotification(msg, isError ? 'error' : 'success');
    if (!isError) {
      setTimeout(() => {
        buttons.forEach(btn => {
          btn.disabled = false;
          btn.style.animation = 'none';
        });
      }, 4000);
    } else {
      buttons.forEach(btn => {
        btn.disabled = false;
        btn.style.animation = 'none';
      });
    }
  })
  .catch(err => {
    showVoteNotification('✗ Error casting vote');
    buttons.forEach(btn => {
      btn.disabled = false;
      btn.style.animation = 'none';
    });
  });
}
</script>

</body>
</html>
